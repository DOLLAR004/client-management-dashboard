<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loomtech | Client Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { background: #1e293b; color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 24px; }
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; color: #334155; font-size: 18px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        label { display: block; margin-top: 10px; font-weight: 600; color: #475569; font-size: 14px; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 4px; }
        button { width: 100%; margin-top: 15px; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f8fafc; color: #64748b; font-size: 13px; text-transform: uppercase; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge.Active { background: #dcfce7; color: #15803d; }
        .badge.Pending { background: #fef9c3; color: #a16207; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Loomtech Client Management Portal</h1>
        </header>
        
        <div class="grid">
            <!-- Left Side: Form to Add Clients -->
            <div class="card">
                <h2>Register New Client</h2>
                <form action="/add_client" method="POST">
                    <label>Client Name:</label>
                    <input type="text" name="name" required placeholder="e.g. John Doe">
                    
                    <label>Email Address:</label>
                    <input type="email" name="email" required placeholder="name@company.com">
                    
                    <label>Assigned Service:</label>
                    <select name="service">
                        <option value="Web Development">Web Development</option>
                        <option value="Graphic Design">Graphic Design</option>
                        <option value="IT Support">IT Support</option>
                    </select>
                    
                    <label>Project Status:</label>
                    <select name="status">
                        <option value="Active">Active</option>
                        <option value="Pending">Pending</option>
                    </select>
                    
                    <button type="submit">Add to Dashboard</button>
                </form>
            </div>

            <!-- Right Side: Live Client Tracker Board -->
            <div class="card">
                <h2>Active Operational Tracks</h2>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Client Name</th>
                            <th>Email</th>
                            <th>Service</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for client in clients %}
                        <tr>
                            <td>{{ client.id }}</td>
                            <td><strong>{{ client.name }}</strong></td>
                            <td>{{ client.email }}</td>
                            <td>{{ client.service }}</td>
                            <td><span class="badge {{ client.status }}">{{ client.status }}</span></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
